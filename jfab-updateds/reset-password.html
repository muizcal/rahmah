<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password — J-Fab Perfumes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1209 0%, #2d2010 50%, #1a1209 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      text-align: center;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      color: #C9A84C;
      letter-spacing: 5px;
      margin-bottom: 4px;
    }
    .logo-sub {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(201,168,76,0.5);
      margin-bottom: 32px;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #C9A84C;
      margin: 0 auto 32px;
      opacity: 0.3;
    }

    .icon { font-size: 48px; margin-bottom: 16px; }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: #1a1209;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #999;
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .input-group { margin-bottom: 16px; position: relative; }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e0d8c9;
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      color: #1a1209;
      background: #faf8f4;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #C9A84C; background: #fff; }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #aaa;
    }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: #eee;
      margin-top: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 4px;
      text-align: left;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #C9A84C, #a8873c);
      color: #1a1209;
      border: none;
      border-radius: 30px;
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #C9A84C;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1209;
      color: #C9A84C;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.88rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.35s cubic-bezier(.175,.885,.32,1.275);
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #1a3a1a; color: #5cb85c; }
    .toast.error   { background: #3a1a1a; color: #e74c3c; }

    /* success state */
    #success-state { display: none; }
    #form-state    { display: block; }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">J·FAB</div>
    <div class="logo-sub">Perfumes Signature</div>
    <div class="divider"></div>

    <!-- FORM STATE -->
    <div id="form-state">
      <div class="icon">🔐</div>
      <h1>Set New Password</h1>
      <p class="subtitle">Choose a strong password for your J-Fab account</p>

      <div class="input-group">
        <input type="password" id="new-password" placeholder="New Password" oninput="checkStrength(this.value)">
        <button class="toggle-pw" type="button" onclick="toggleVis('new-password', this)" title="Show/hide">👁</button>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="input-group">
        <input type="password" id="confirm-password" placeholder="Confirm New Password">
        <button class="toggle-pw" type="button" onclick="toggleVis('confirm-password', this)" title="Show/hide">👁</button>
      </div>

      <button class="btn" id="reset-btn" onclick="resetPassword()">Reset Password</button>
      <br>
      <a class="back-link" href="index.html">← Back to Store</a>
    </div>

    <!-- SUCCESS STATE -->
    <div id="success-state">
      <div class="icon">✅</div>
      <h1>Password Reset!</h1>
      <p class="subtitle">Your password has been updated successfully.<br>You can now log in with your new password.</p>
      <a class="btn" href="index.html" style="display:inline-block;text-decoration:none;padding:14px 32px">Back to Store</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── API base ──────────────────────────────────────────────────────────────
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5000/api'
      : (window.JFAB_API || 'https://j-fab-production.up.railway.app/api');

    // ── Get token from URL ────────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (!resetToken) {
      showToast('Invalid or missing reset link.', 'error');
      document.getElementById('reset-btn').disabled = true;
    }

    // ── Toggle password visibility ────────────────────────────────────────────
    function toggleVis(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁'; }
    }

    // ── Password strength meter ───────────────────────────────────────────────
    function checkStrength(val) {
      const fill  = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '0%',  color: '#eee',    text: '' },
        { pct: '25%', color: '#e74c3c', text: 'Too weak' },
        { pct: '50%', color: '#e67e22', text: 'Weak' },
        { pct: '70%', color: '#f1c40f', text: 'Fair' },
        { pct: '85%', color: '#2ecc71', text: 'Strong' },
        { pct: '100%',color: '#27ae60', text: 'Very strong' },
      ];
      const l = levels[Math.min(score, 5)];
      fill.style.width   = l.pct;
      fill.style.background = l.color;
      label.textContent  = l.text;
      label.style.color  = l.color;
    }

    // ── Reset password ────────────────────────────────────────────────────────
    async function resetPassword() {
      const newPassword    = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!newPassword || newPassword.length < 6) {
        showToast('Password must be at least 6 characters', 'error'); return;
      }
      if (newPassword !== confirmPassword) {
        showToast('Passwords do not match', 'error'); return;
      }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting…';

      try {
        const res  = await fetch(`${API_BASE}/auth/reset-password/${resetToken}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('form-state').style.display    = 'none';
          document.getElementById('success-state').style.display = 'block';
        } else {
          showToast(data.message || 'Reset failed. Try requesting a new link.', 'error');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (err) {
        showToast('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast' + (type ? ' ' + type : '');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }
  </script>
</body>
</html>
